name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build -w @dsa-studio/shared

      - name: Generate Prisma client
        run: npm run db:generate -w @dsa-studio/api

      - name: Lint web
        run: npm run lint -w @dsa-studio/web

      - name: Typecheck
        run: npm run typecheck

      - name: Build web and API
        run: npm run build:web && npm run build:api

  api-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dsa_studio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d dsa_studio_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dsa_studio_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-jwt-secret
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build -w @dsa-studio/shared

      - name: Generate Prisma client
        run: npm run db:generate -w @dsa-studio/api

      - name: Run migrations
        run: npx prisma migrate deploy --schema apps/api/prisma/schema.prisma

      - name: Seed test database
        run: npm run db:seed -w @dsa-studio/api

      - name: Run API tests
        run: npm run test -w @dsa-studio/api

  e2e:
    runs-on: ubuntu-latest
    needs: lint-typecheck-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared + web
        run: npm run build -w @dsa-studio/shared && npm run build:web

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright E2E
        run: npm run test:e2e
        env:
          CI: true

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-typecheck-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build production API image
        run: docker build -f infra/docker/Dockerfile.api -t dsa-api:ci .

      - name: Build production web image
        run: docker build -f infra/docker/Dockerfile.web -t dsa-web:ci .
